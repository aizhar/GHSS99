<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Class fellow profile — Matric Class of 1999, GHSS Farooq Abad." />
    <title>Profile — GHSS Farooq Abad Class of 1999</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api.cloudinary.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body data-page="fellows">
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="topbar">
      <div class="container nav-inner">
        <a class="brand" href="/">
          <span class="brand-mark">GHSS</span>
          <span class="brand-text">Farooq Abad <small>Matric Class of '99</small></span>
        </a>
        <nav class="nav-links" aria-label="Primary">
          <a href="/" data-nav="fellows">Class Fellows</a>
          <a href="/gallery.html" data-nav="gallery">Photo Gallery</a>
        </nav>
        <div class="nav-actions">
          <button id="auth-btn" class="btn btn-ghost" type="button">Admin login</button>
        </div>
      </div>
    </header>

    <main id="main" tabindex="-1">
      <div class="container">
        <a class="back-link" href="/">&larr; Back to directory</a>
        <article id="profile-view" aria-live="polite">
          <p class="profile-state">Loading profile…</p>
        </article>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">
        Govt. Higher Secondary School, Farooq Abad · Matric Class of 1999
      </div>
    </footer>

    <!-- ===== Lightbox ===== -->
    <div id="lightbox" class="lightbox" hidden>
      <button class="lightbox-close" data-close aria-label="Close">&times;</button>
      <button class="lightbox-nav prev" id="lb-prev" type="button" aria-label="Previous photo">&#8249;</button>
      <button class="lightbox-nav next" id="lb-next" type="button" aria-label="Next photo">&#8250;</button>
      <div>
        <img id="lb-img" src="" alt="" />
        <div class="lightbox-cap" id="lb-cap"></div>
      </div>
    </div>

    <!-- ===== Edit profile modal (admin) ===== -->
    <div id="profile-modal" class="modal" hidden>
      <div class="modal-backdrop" data-close></div>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="profile-modal-title">
        <div class="modal-head">
          <h2 id="profile-modal-title">Edit profile</h2>
          <button class="icon-btn" type="button" data-close aria-label="Close">&times;</button>
        </div>
        <form id="profile-form" class="modal-body">
          <div class="field">
            <label for="name">Name <span class="req">*</span></label>
            <input id="name" name="name" type="text" required minlength="2" maxlength="80" />
          </div>
          <div class="field">
            <label for="section">Section <span class="req">*</span></label>
            <select id="section" name="section" required>
              <option value="" disabled>Select a section…</option>
            </select>
          </div>
          <div class="field">
            <label for="description">About</label>
            <textarea id="description" name="description" rows="4" maxlength="1000"></textarea>
          </div>
          <div class="field">
            <label for="photos">Photos</label>
            <input id="photos" name="photos" type="file" accept="image/*" multiple />
            <small id="upload-hint" class="hint">Selecting new photos will replace the existing ones.</small>
            <div id="photo-previews" class="photo-previews"></div>
          </div>
          <p id="profile-form-error" class="form-error" role="alert"></p>
          <div class="modal-foot">
            <button type="button" class="btn btn-ghost" data-close>Cancel</button>
            <button type="submit" class="btn btn-primary" id="profile-submit">Save changes</button>
          </div>
        </form>
      </div>
    </div>

    <!-- ===== Admin login modal ===== -->
    <div id="login-modal" class="modal" hidden>
      <div class="modal-backdrop" data-close></div>
      <div class="modal-card narrow" role="dialog" aria-modal="true" aria-labelledby="login-title">
        <div class="modal-head">
          <h2 id="login-title">Admin login</h2>
          <button class="icon-btn" type="button" data-close aria-label="Close">&times;</button>
        </div>
        <form id="login-form" class="modal-body">
          <div class="field">
            <label for="login-username">Username</label>
            <input id="login-username" name="username" type="text" autocomplete="username" required />
          </div>
          <div class="field">
            <label for="login-password">Password</label>
            <input id="login-password" name="password" type="password" autocomplete="current-password" required />
          </div>
          <p id="login-error" class="form-error" role="alert"></p>
          <div class="modal-foot">
            <button type="button" class="btn btn-ghost" data-close>Cancel</button>
            <button type="submit" class="btn btn-primary">Log in</button>
          </div>
        </form>
      </div>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

    <script src="/js/common.js" defer></script>
    <script src="/js/profile.js" defer></script>
  </body>
</html>
